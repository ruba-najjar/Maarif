<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة أداء معارف - النسخة النهائية</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f9; text-align: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; min-width: 300px; }
        #loading { color: #2563eb; font-weight: bold; }
        .error { color: red; display: none; }
        #dashboard { display: none; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background: #2563eb; color: white; }
    </style>
</head>
<body>

    <div class="card">
        <h2>تحليل بيانات مدارس معارف</h2>
        <div id="loading">جاري سحب البيانات من السحابة...</div>
        <div id="error" class="error">عذراً، فشل الاتصال التلقائي. حاول تحديث الصفحة أو تأكد من نشر الملف.</div>
        
        <div id="dashboard">
            <p>تم تحميل البيانات بنجاح!</p>
            <div id="stats"></div>
            <table id="resultTable">
                <thead><tr><th>الطالب</th><th>الدرجة</th><th>الحالة</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

<script>
    // الرابط المباشر
    const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSAQ40puYjSJB8ysFLfRZU2vLf_TzKg0OxQ1l06WTR-g0ie5BugxrI2GVOs_ykvUaNER8NVLKZdAwu-/pub?gid=2095658793&single=true&output=csv';

    async function loadData() {
        try {
            // إضافة رمز عشوائي للرابط لمنع المتصفح من قراءة نسخة قديمة (Cache)
            const finalUrl = url + '&cache=' + new Date().getTime();
            
            const response = await fetch(finalUrl);
            if (!response.ok) throw new Error();
            
            const data = await response.text();
            
            Papa.parse(data, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    displayData(results.data);
                }
            });
        } catch (e) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
        }
    }

    function displayData(rows) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        
        const tbody = document.querySelector('#resultTable tbody');
        tbody.innerHTML = '';
        
        // لنأخذ أول 10 طلاب كمثال للتأكد من العمل
        rows.slice(0, 15).forEach(row => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${row.StudentNameArabic || 'اسم غير معروف'}</td>
                            <td>${row.IsCorrect || 0}</td>
                            <td>${row.IsSolved == 1 ? 'تم الحل' : 'غائب'}</td>`;
            tbody.appendChild(tr);
        });
    }

    loadData();
</script>
</body>
</html>
